meters:
- name: live_app_key_activation
  description: One-off fee to activate a Live Application Key for real-time data and betting.
  unit: activation
  aggregation: sum
  dimensions:
  - account
  - keyType
- name: exchange_commission
  description: Commission charged on net winnings per market, derived from market base rate and discount rate.
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - market
  - eventType
- name: data_request_charges
  description: Charges applied when weighted API data usage is high relative to betting turnover.
  unit: currency
  aggregation: sum
  dimensions:
  - account
- name: historic_data_packages
  description: Purchases of historical exchange data packages downloaded via the Historic Data API.
  unit: package
  aggregation: sum
  dimensions:
  - account
  - sport
  - plan
principles:
- name: Visibility
  description: Track commission paid per market/event type, data request weighting, and Historic Data purchases; monitor connectionsAvailable and stream usage.
- name: Allocation
  description: Tag strategies via customerStrategyRef so commission and data usage map to specific trading strategies or teams.
- name: Optimization
  description: Use the Exchange Stream API instead of polling listMarketBook to cut data weighting and avoid Data Request Charges; batch bets in single placeOrders calls; manage commission through the discount rate; scope Historic Data purchases to needed sports/date ranges.
- name: Accountability
  description: Assign owners per strategy/app key; review commission, data charges, and P&L against trading budgets on a regular cadence.
