description: >-
  FinOps view of Betfair Exchange API spend. Unlike a metered SaaS API, the cost
  of operating on Betfair is not a per-call subscription. The direct API costs
  are a one-off Live Application Key activation fee (development runs free on a
  Delayed App Key) and any Historic Data package purchases. The dominant ongoing
  cost of an automated strategy is exchange commission charged on net winnings
  per market (derived from the market base rate and the customer's discount
  rate), plus the trading capital at risk - neither of which is a conventional
  cloud line item. Betfair may also levy Data Request Charges on accounts whose
  weighted API data usage is high relative to their betting activity, which
  effectively prices inefficient polling. Cost optimization therefore centers on
  using the Exchange Stream API instead of heavy listMarketBook polling,
  batching orders, and managing commission via the discount rate.
notes: >-
  Activation fees, commission/market base rates, discount rates, and Historic
  Data prices vary by jurisdiction and over time and are not reconciled here.
  Verify on Betfair's developer, pricing, and historic-data pages.
