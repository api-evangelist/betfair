aid: betfair
url: https://raw.githubusercontent.com/api-evangelist/betfair/refs/heads/main/apis.yml
name: Betfair
kind: company
description: Betfair operates the world's largest online betting exchange, where
  customers back and lay outcomes against each other rather than against a
  bookmaker. The Betfair Exchange API (API-NG) gives automated clients
  programmatic access to the exchange - navigating markets, retrieving live prices,
  placing and managing bets, and reading account state. It is exposed as
  lightweight JSON-RPC and REST operations over HTTPS under
  https://api.betfair.com/exchange (the Betting, Accounts, and Heartbeat APIs),
  with a separate real-time Exchange Stream API delivered over a raw SSL/TCP
  socket (CRLF-delimited JSON, not WebSocket) for low-latency market and order
  updates. A Historic Data API and a licensed Vendor (affiliate) API round out
  the platform. Auth combines an Application Key with a session token (ssoid)
  obtained from Betfair's identity SSO login.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
