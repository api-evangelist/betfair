  endpointsModeledStream:
    - stream-api.betfair.com:443 (SSL socket) - authentication request
    - stream-api.betfair.com:443 (SSL socket) - marketSubscription request
    - stream-api.betfair.com:443 (SSL socket) - orderSubscription request
    - stream-api.betfair.com:443 (SSL socket) - heartbeat request
    - stream-api.betfair.com:443 (SSL socket) - connection / status / mcm / ocm responses
  endpointsNote: |
    The Betting/Accounts/Heartbeat REST paths and the identity SSO endpoints are
    confirmed against Betfair's published API reference and are documented as
    both JSON-RPC and REST. Request/response field sets in the OpenAPI are
    simplified to primary fields (representative), not exhaustive. The Exchange
    Stream API message shapes (mcm/ocm compressed field names like batb/batl,
    ltp, tv) are modeled from Betfair's stream-api sample code and Swagger
    schema. The Vendor API OAuth2 endpoints are documented conceptually but not
    enumerated here.
sources:
  - url: https://developer.betfair.com/
    type: Documentation
    note: Betfair Developer Program hub listing the Exchange API, Historic Data, and Vendor programs.
  - url: https://developer.betfair.com/exchange-api/
    type: Documentation
    note: Guide to the Exchange API - Betting API and Accounts API over JSON/JSON-RPC, plus the Exchange Stream API for low-latency updates.
  - url: https://docs.developer.betfair.com/display/1smk3cen4v3lu3yomq5qye0ni/API+Overview
    type: APIReference
    note: API-NG overview - JSON-RPC and REST, app key + session token auth (returned HTTP 403 to automated fetch; corroborated via search and mirror docs).
  - url: https://docs.developer.betfair.com/display/1smk3cen4v3lu3yomq5qye0ni/Exchange+Stream+API
    type: Documentation
    note: Exchange Stream API - SSL socket, CRLF-delimited JSON, subscription push.
  - url: https://github.com/betfair/stream-api-sample-code
    type: SourceCode
    note: Official stream sample code - confirms SSL socket to stream-api.betfair.com:443, CRLF JSON, integration host, 15s connect timeout, and message ops.
  - url: https://support.developer.betfair.com/hc/en-us/articles/12937897844252-Does-the-Stream-API-allow-Web-Socket-connections
    type: Documentation
    note: Betfair support - the Stream API does NOT allow WebSocket connections; it is an SSL socket protocol.
  - url: https://support.developer.betfair.com/hc/en-us/articles/115003864531-Are-there-any-costs-associated-with-API-access
    type: Documentation
    note: Costs - Delayed App Key is free; Live App Key requires a one-off activation fee.
  - url: https://historicdata.betfair.com/
    type: Documentation
    note: Historic Data service - purchase packages, download via the Historic Data API (GetMyData, DownloadFile, etc.).
actions:
  asyncapiPath: asyncapi/betfair-asyncapi.yml
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists, so the WebSocket answer is FALSE.
    However, Betfair does operate a genuine real-time server-push channel (the
    Exchange Stream API) over a raw SSL/TCP socket with CRLF-delimited JSON. An
    AsyncAPI 2.6 document was authored for that stream, with the transport
    labeled secure-tcp and documented throughout (server protocol,
    x-transport-notes, channel descriptions) as a raw SSL socket that is NOT
    WebSocket and that refuses WebSocket connections, so the streaming surface
    is captured without being misrepresented as WebSocket.
