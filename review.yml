aid: betfair
name: Betfair
review:
  question: Does Betfair expose a documented public WebSocket API?
  answer: false
  date: '2026-07-03'
  reviewer: API Evangelist
  asyncapiSpecCreated: true
  asyncapiScopeNote: |
    An AsyncAPI 2.6 document was authored at asyncapi/betfair-asyncapi.yml, but
    NOT because Betfair offers WebSocket. It models the Exchange Stream API,
    which is a real streaming server-push transport - however that transport is
    a raw SSL/TCP socket (CRLF-delimited JSON), not WebSocket. The AsyncAPI
    server protocol is set to `secure-tcp` and info.x-transport-notes plus the
    channel descriptions state explicitly that this is a raw TCP-over-SSL socket
    on stream-api.betfair.com:443 and that Betfair refuses WebSocket
    connections. The document is included because the Stream API is a genuine
    asynchronous, subscription-based push channel worth modeling; the transport
    is never represented as WebSocket.
findings:
  summary: |
    Betfair does NOT publish a documented public WebSocket API. The Betfair
    Exchange API (API-NG) is a request/response HTTP API exposed as lightweight
    JSON-RPC 2.0 and per-operation REST over HTTPS under
    https://api.betfair.com/exchange, split into the Betting API (SportsAPING),
    the Accounts API (AccountAPING), and the Heartbeat API (HeartbeatAPING).
    Authentication uses an Application Key (X-Application) plus a session token /
    ssoid (X-Authentication) obtained from Betfair identity SSO login
    (identitysso.betfair.com). A Historic Data API (REST over HTTPS at
    historicdata.betfair.com) and a licensed Web Vendor Facility (OAuth2 for
    third-party web betting apps) complete the platform.

    Betfair DOES offer a real-time streaming API - the Exchange Stream API - but
    it is a persistent raw SSL/TCP socket to stream-api.betfair.com on port 443,
    exchanging CRLF-delimited JSON (one JSON object per line). Betfair's own
    documentation and support state that this is a normal SSL socket and that
    any attempted WebSocket connection will be refused. So while there is a
    streaming/server-push transport, it is NOT WebSocket (no ws:// or wss://
    endpoint is documented anywhere).
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.betfair.com/exchange
      documented: true
      note: Per-operation REST for Betting (/betting/rest/v1.0/), Accounts (/account/rest/v1.0/), and Heartbeat (/heartbeat/rest/v1.0/). Each operation is an HTTP POST with a JSON body.
    - protocol: JSON-RPC
      scheme: https
      baseURL: https://api.betfair.com/exchange
      documented: true
      note: JSON-RPC 2.0 at /betting/json-rpc/v1, /account/json-rpc/v1, /heartbeat/json-rpc/v1 with method names like SportsAPING/v1.0/listMarketCatalogue.
    - protocol: Secure TCP Stream (SSL socket, CRLF-delimited JSON)
      scheme: tcp+ssl
      baseURL: stream-api.betfair.com:443
      documented: true
      note: >-
        Exchange Stream API. A persistent raw SSL/TCP socket carrying
        newline (CRLF) delimited JSON messages (authentication,
        marketSubscription, orderSubscription, heartbeat requests; connection,
        status, mcm, ocm responses). This is server-push streaming but it is
        NOT WebSocket - Betfair explicitly refuses WebSocket connections.
    - protocol: OAuth2 (Web Vendor Facility)
      scheme: https
      documented: true
      note: Authorization-code style flow so licensed vendor web apps can act on a customer's behalf. HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: >-
        No WebSocket (ws:// or wss://) endpoint is documented anywhere in the
        Betfair Exchange API. The only streaming surface is the Exchange Stream
        API, which is a raw SSL/TCP socket and explicitly refuses WebSocket
        connections per Betfair support ("Does the Stream API allow Web Socket
        connections?" - no).
